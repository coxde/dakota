name: Build Bluefin dakota

on:
  schedule:
    # 13:00 UTC daily — gnome-build-meta nightly starts ~02:00 UTC and typically
    # finishes by ~08:00 UTC (worst-case ~11:30). The 2-hour buffer here handles
    # normal build-time fluctuations so dakota always picks up the freshest artifacts.
    - cron: '0 13 * * *'
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]
  workflow_dispatch:
    # WARNING: Do not manually dispatch immediately after auto/track-* ref bumps
    # (e.g. Renovate PRs updating gnome-build-meta.bst). Cold builds of GNOME
    # require gbm.gnome.org to have built the new ref first. The 13:00 UTC
    # schedule above provides this buffer. Early dispatch = cold build = timeout.

env:
  IMAGE_NAME: dakota
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

# Only one build at a time. If a manual dispatch arrives while a scheduled
# build is running, the in-progress run is cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    # Variant matrix: the default Bluefin image and the NVIDIA variant build
    # in parallel. They share the BST artifact cache via cache.projectbluefin.io,
    # so whichever runs first warms the closure for the other. NVIDIA is
    # `continue-on-error: true` so its failure doesn't block the default image's
    # publication, and `publish: false` keeps it out of GHCR until promoted.
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            element: oci/bluefin.bst
            image_suffix: ''
            publish: true
            continue: false
          - variant: nvidia
            element: oci/bluefin-nvidia.bst
            image_suffix: '-nvidia'
            publish: true
            continue: true
    continue-on-error: ${{ matrix.continue }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check bst2 image pin consistency
        run: |
          just_sha="$(grep -oE 'bst2:[a-f0-9]{40}' Justfile | cut -d: -f2)"
          track_sha="$(grep -oE 'bst2:[a-f0-9]{40}' .github/workflows/track-bst-sources.yml | cut -d: -f2)"
          if [[ -z "$just_sha" || -z "$track_sha" ]]; then
            echo "ERROR: could not find bst2 SHA (Justfile: '${just_sha:-missing}', track-bst-sources.yml: '${track_sha:-missing}')"; exit 1
          fi
          [[ "$just_sha" == "$track_sha" ]] || { echo "ERROR: bst2 pin drift — Justfile: $just_sha  track-bst-sources.yml: $track_sha"; exit 1; }
          echo "OK: bst2 pins consistent: $just_sha"

      # FIXME: Make the build with JWT work
      # - name: Get JWT token
      #   uses: actions/github-script@v7
      #   with:
      #     script: |
      #       const fs = require('fs');
      #       const token = await core.getIDToken('cache.projectbluefin.io')
      #       fs.writeFileSync('bluefin.token', token, { mode: 0o600 });

      - name: Setup Just
        uses: taiki-e/install-action@just

      - name: Capture build timestamp
        id: timestamp
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      # ── Disk and storage setup ────────────────────────────────────────
      # Both steps must run before any podman call (BST uses rootful podman
      # to pull bst2; storage backend must be stable before first use).
      - name: Remove unwanted software
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9

      - name: Mount BTRFS for podman storage
        id: container-storage
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2
          loopback-free: '1'

      # ── Generate CI-specific BuildStream config ───────────────────────
      # Tuned per gnome-build-meta CI patterns:
      # - on-error: continue  -> find ALL failures, don't stop at first
      # - fetchers: 32        -> parallel downloads from upstream caches
      # - builders: 4         -> Concurrent builds are controlled in the casd server
      # - retry-failed: True  -> auto-retry flaky builds
      # - error-lines: 80     -> generous error context in logs
      # - cache-buildtrees: never -> save disk (we only need final artifacts)
      #
      - name: Generate BuildStream CI config
        env:
          CASD_CLIENT_CERT: ${{ vars.CASD_CLIENT_CERT }}
          CASD_CLIENT_KEY: ${{ secrets.CASD_CLIENT_KEY }}
        run: |
          mkdir -p logs

          # Setup certificate for pushing to the cache
          echo "$CASD_CLIENT_CERT" > client.crt
          echo "$CASD_CLIENT_KEY" > client.key
          cat > buildstream-ci.conf <<'BSTCONF'
          scheduler:
            on-error: continue
            fetchers: 32
            builders: 4
            network-retries: 3

          logging:
            message-format: '[%{wallclock}][%{elapsed}][%{key}][%{element}] %{action} %{message}'
            error-lines: 80

          cachedir: /root/.cache/buildstream
          logdir: /src/logs

          BSTCONF

          if [[ -n "$CASD_CLIENT_CERT" ]] && [[ -n "$CASD_CLIENT_KEY" ]]; then
            cat >> buildstream-ci.conf <<'BSTCONFPUSH'
          build:
            retry-failed: True
            max-jobs: 32
          BSTCONFPUSH
          else
            cat >> buildstream-ci.conf <<'BSTCONFNOPUSH'
          build:
            retry-failed: True
          BSTCONFNOPUSH
          fi

          if [[ -n "$CASD_CLIENT_CERT" ]] && [[ -n "$CASD_CLIENT_KEY" ]]; then
            cat >> buildstream-ci.conf <<'BSTCONFPUSH'
          artifacts:
            servers:
            - url: https://cache.projectbluefin.io:11002
              push: true
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt

          source-caches:
            servers:
            - url: https://cache.projectbluefin.io:11002
              push: true
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt

          cache:
            storage-service:
              url: https://cache.projectbluefin.io:11002
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt

          remote-execution:
            execution-service:
              url: https://cache.projectbluefin.io:11002
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt
            action-cache-service:
              url: https://cache.projectbluefin.io:11002
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt
          BSTCONFPUSH
          fi

          echo "=== BuildStream CI config ==="
          cat buildstream-ci.conf

      # ── BuildStream build ─────────────────────────────────────────────
      # Uses the Justfile's `bst` wrapper to run BuildStream inside the
      # bst2 container. CI-specific flags (--no-interactive, --config)
      # are injected via BST_FLAGS env var.

      - name: Build OCI image with BuildStream
        env:
          BST_FLAGS: -o x86_64_v3 true --no-interactive --config /src/buildstream-ci.conf
        run: |
          just bst build ${{ matrix.element }}
        timeout-minutes: 420

      # ── Upload build logs ─────────────────────────────────────────────
      # Always upload, even on failure, so build failures can be diagnosed.

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: buildstream-logs-x86_64-${{ matrix.variant }}
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

  # ── Export, chunkify, SBOM, and artifact upload ──────────────────────────
  # Separate job so this runs on a FRESH runner with an empty local BST cache.
  # Root cause: `bst build` with remote execution registers the artifact key in
  # the local BST DB but does NOT download the blobs. On the same runner,
  # `bst artifact checkout` finds the key, skips the pull stage (thinks it's
  # local), then fails staging with "No artifacts to stage". A fresh runner has
  # no local BST state so BST genuinely pulls from remote CAS before checkout.
  #
  # Config uses push: false (artifact fetch-only, no remote-execution section)
  # so BST operates in pure client/fetch mode — same pattern as the old
  # standalone publish.yml that worked correctly.
  #
  # chunkah runs inside `just export` (see Justfile:154); produces 120
  # plain-zstd layers ready for `podman push --compression-format=zstd`.
  export:
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      actions: write    # for artifact upload
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Just
        uses: taiki-e/install-action@just

      - name: Capture build timestamp
        id: timestamp
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      # Storage setup must precede all podman calls (BST uses rootful podman).
      - name: Remove unwanted software
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9

      - name: Mount BTRFS for podman storage
        id: container-storage
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2
          loopback-free: '1'

      # Fetch-only BST config: push: false on all servers, no remote-execution.
      # This is the critical difference from the build job — BST will pull
      # artifact blobs from the remote CAS instead of treating them as "local".
      - name: Generate BST fetch config
        env:
          CASD_CLIENT_CERT: ${{ vars.CASD_CLIENT_CERT }}
          CASD_CLIENT_KEY: ${{ secrets.CASD_CLIENT_KEY }}
        run: |
          mkdir -p logs
          echo "$CASD_CLIENT_CERT" > client.crt
          echo "$CASD_CLIENT_KEY" > client.key
          cat > buildstream-ci.conf <<'BSTCONF'
          scheduler:
            on-error: continue
            fetchers: 32
            builders: 4
            network-retries: 3

          logging:
            message-format: '[%{wallclock}][%{elapsed}][%{key}][%{element}] %{action} %{message}'
            error-lines: 80

          cachedir: /root/.cache/buildstream
          logdir: /src/logs

          BSTCONF

          if [[ -n "$CASD_CLIENT_CERT" ]] && [[ -n "$CASD_CLIENT_KEY" ]]; then
            cat >> buildstream-ci.conf <<'BSTCONFFETCH'
          artifacts:
            servers:
            - url: https://cache.projectbluefin.io:11002
              push: false
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt

          source-caches:
            servers:
            - url: https://cache.projectbluefin.io:11002
              push: false
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt
          BSTCONFFETCH
          fi

          echo "=== BST fetch config ==="
          cat buildstream-ci.conf

      - name: Export OCI image from BuildStream
        id: export
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
          BUILD_IMAGE_NAME: ${{ env.IMAGE_NAME }}
          OCI_IMAGE_CREATED: ${{ steps.timestamp.outputs.created }}
          OCI_IMAGE_REVISION: ${{ github.sha }}
          OCI_IMAGE_VERSION: latest
        run: just export

      - name: Validate with bootc container lint
        run: just lint

      - name: Generate SBOM
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf
        run: just sbom

      # Save OCI archive to BTRFS volume; compression happens at push time.
      - name: Save OCI archive
        run: |
          sudo podman save --format oci-archive \
            -o /var/lib/containers/dakota.oci.tar \
            "${{ env.IMAGE_NAME }}:latest"

      - name: Upload OCI and SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dakota-oci-${{ github.sha }}
          path: |
            /var/lib/containers/dakota.oci.tar
            dakota.spdx.json
          retention-days: 3
          if-no-files-found: error

  # ── aarch64 native build ──────────────────────────────────────────────────
  # Mirrors the x86_64 build job. ARM failures do not fail the workflow or
  # block x86_64 publication — this is an experimental parallel build.
  # Disabled: webkit cold-builds OOM/timeout the ARM runner. Re-enable once
  # the webkit artifacts are cached in cache.projectbluefin.io.
  build-aarch64:
    if: false
    runs-on: ubuntu-24.04-arm
    continue-on-error: true
    outputs:
      pushed: ${{ steps.push-aarch64.outputs.pushed }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Mount BTRFS for podman storage
        id: container-storage
        uses: ublue-os/container-storage-action@dc1f4c8f17b672069e921f001132f7cf98a423a6
        continue-on-error: true
        with:
          target-dir: /var/lib/containers
          mount-opts: compress-force=zstd:2
          loopback-free: '1'

      - name: Remove unwanted software
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9

      - name: Setup Just
        uses: taiki-e/install-action@just

      - name: Capture build timestamp
        id: timestamp
        run: echo "created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Generate BuildStream CI config
        env:
          CASD_CLIENT_CERT: ${{ vars.CASD_CLIENT_CERT }}
          CASD_CLIENT_KEY: ${{ secrets.CASD_CLIENT_KEY }}
        run: |
          mkdir -p logs

          echo "$CASD_CLIENT_CERT" > client.crt
          echo "$CASD_CLIENT_KEY" > client.key
          cat > buildstream-ci.conf <<'BSTCONF'
          scheduler:
            on-error: continue
            fetchers: 32
            builders: 4
            network-retries: 3

          logging:
            message-format: '[%{wallclock}][%{elapsed}][%{key}][%{element}] %{action} %{message}'
            error-lines: 80

          cachedir: /root/.cache/buildstream
          logdir: /src/logs

          build:
            retry-failed: True

          BSTCONF

          if [[ -n "$CASD_CLIENT_CERT" ]] && [[ -n "$CASD_CLIENT_KEY" ]]; then
            cat >> buildstream-ci.conf <<'BSTCONFPUSH'
          artifacts:
            servers:
            - url: https://cache.projectbluefin.io:11002
              push: true
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt

          source-caches:
            servers:
            - url: https://cache.projectbluefin.io:11002
              push: true
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt

          cache:
            storage-service:
              url: https://cache.projectbluefin.io:11002
              connection-config:
                keepalive-time: 180
                retry-limit: 5
                retry-delay: 1000
                request-timeout: 180
              auth:
                client-key: /src/client.key
                client-cert: /src/client.crt

          # remote-execution is intentionally omitted for aarch64:
          # cache.projectbluefin.io only has x86_64 workers and rejects
          # aarch64 jobs with "Unsupported ISA aarch64". Builds run locally
          # on the ubuntu-24.04-arm runner; artifacts are still cached.
          BSTCONFPUSH
          fi

          echo "=== BuildStream CI config ==="
          cat buildstream-ci.conf

      - name: Build OCI image with BuildStream (aarch64)
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf --option arch aarch64
        run: |
          just bst build oci/bluefin.bst
        timeout-minutes: 420

      - name: Export OCI image from BuildStream
        id: export
        env:
          BST_FLAGS: --no-interactive --config /src/buildstream-ci.conf --option arch aarch64
          BUILD_IMAGE_NAME: ${{ env.IMAGE_NAME }}
          OCI_IMAGE_CREATED: ${{ steps.timestamp.outputs.created }}
          OCI_IMAGE_REVISION: ${{ github.sha }}
          OCI_IMAGE_VERSION: aarch64
        run: |
          just export
          echo "image_ref=${{ env.IMAGE_NAME }}:aarch64" >> "$GITHUB_OUTPUT"

      - name: Verify image loaded
        run: sudo podman images

      - name: Validate with bootc container lint
        run: |
           just lint

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: buildstream-logs-aarch64
          path: logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Login to GHCR
        if: >-
          github.event_name == 'merge_group' ||
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Tag image for GHCR
        if: >-
          github.event_name == 'merge_group' ||
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch'
        run: |
          sudo podman tag "localhost/${{ steps.export.outputs.image_ref }}" \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:aarch64"
          sudo podman tag "localhost/${{ steps.export.outputs.image_ref }}" \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:aarch64-${{ github.sha }}"

      - name: Push to GHCR
        id: push-aarch64
        if: >-
          github.event_name == 'merge_group' ||
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch'
        run: |
          for tag in aarch64 "aarch64-${{ github.sha }}"; do
            for i in 1 2 3; do
              # Plain zstd required — see x86_64 push step comment above.
              sudo podman push --compression-format=zstd \
                "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${tag}" && break
              echo "Push attempt $i failed for tag ${tag}, retrying..."
              sleep 5
            done
          done
          echo "pushed=true" >> "$GITHUB_OUTPUT"

  # ── Multi-arch manifest ───────────────────────────────────────────────────
  # Combines :latest (x86_64) and :aarch64 into a single multi-arch manifest.
  # Only runs when :aarch64 was actually pushed this run (not just when the
  # job completed — continue-on-error makes needs.result == 'success' even on
  # failure, so we gate on the step output instead).
  # ARM failures skip this job without affecting x86_64 publication.
  create-manifest:
    runs-on: ubuntu-24.04
    needs: [build, build-aarch64]
    if: >-
      (github.event_name == 'merge_group' ||
       github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch') &&
      needs.build-aarch64.outputs.pushed == 'true'
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io --username ${{ github.actor }} --password-stdin

      - name: Create and push multi-arch manifest
        run: |
          sudo podman manifest create "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:aarch64"
          sudo podman manifest push "${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
